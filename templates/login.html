<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }

        .title {
            font-weight: 700;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .form-control {
            padding: 12px;
            border-radius: 10px;
        }

        .btn-primary {
            background: #3b82f6;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
        }

        .link {
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            text-decoration: none;
            color: #3b82f6;
        }
    </style>
</head>

<body>

<div class="auth-card">

    <div class="title">Login to your SUBSCRIPTIONZ account</div>
    

    <form method="POST">
        <input class="form-control mb-3" name="email" placeholder="Email" required>
        <input class="form-control mb-3" name="password" type="password" placeholder="Password" required>

        <button class="btn btn-primary w-100">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="/register">Create one</a>
    </div>

</div>

</body>
</html>

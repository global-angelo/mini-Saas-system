{% extends "base.html" %}

{% block page_title %}Edit Plan{% endblock %}
{% block page_subtitle %}Update plan details for "{{ plan['name'] }}"{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="content-card">
            <div class="card-header-custom">
                <h2 class="card-title"><i class="bi bi-pencil-fill"></i> Edit Plan</h2>
            </div>
            <form method="POST" action="/admin/edit_plan/{{ plan['id'] }}">
                <div class="form-group">
                    <label class="form-label">Plan Name</label>
                    <input name="name" class="form-input" value="{{ plan['name'] }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-input" rows="3">{{ plan['description'] }}</textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Price (₱)</label>
                        <input name="price" type="number" step="0.01" class="form-input" value="{{ plan['price'] }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Billing Cycle</label>
                        <select name="billing_cycle" class="form-input" required>
                            <option value="Monthly" {% if plan['billing_cycle'] == 'Monthly' %}selected{% endif %}>Monthly</option>
                            <option value="Quarterly" {% if plan['billing_cycle'] == 'Quarterly' %}selected{% endif %}>Quarterly</option>
                            <option value="Yearly" {% if plan['billing_cycle'] == 'Yearly' %}selected{% endif %}>Yearly</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <a href="/admin" class="btn-custom btn-secondary-custom">
                        <i class="bi bi-arrow-left"></i> Cancel
                    </a>
                    <button type="submit" class="btn-custom btn-primary-custom">
                        <i class="bi bi-check-lg"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
